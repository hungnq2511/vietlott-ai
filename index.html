<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(at 30% 20%,rgba(124,58,237,0.25),transparent 50%),radial-gradient(at 70% 80%,rgba(236,72,153,0.2),transparent 50%),#0a0a0f;color:#e5e7eb}
.box{background:rgba(17,17,26,0.7);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);
  border-radius:20px;padding:36px 32px;width:90%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.icon{font-size:42px;margin-bottom:8px}
h1{margin:0 0 6px;font-size:20px;background:linear-gradient(135deg,#a78bfa,#ec4899,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
p{margin:0 0 22px;font-size:12px;color:#9ca3af}
input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;color:#fff;font-size:18px;letter-spacing:8px;text-align:center;outline:none;transition:all .2s}
input:focus{border-color:#a78bfa;background:rgba(255,255,255,0.06)}
button{width:100%;margin-top:12px;padding:13px;background:linear-gradient(135deg,#a78bfa,#ec4899);
  border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .2s}
button:hover{opacity:0.9}
button:disabled{opacity:0.5;cursor:wait}
.err{color:#f87171;font-size:12px;margin-top:12px;min-height:16px}
